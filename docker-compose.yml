
services:
  nginx:
    network_mode: host
    image: nginx:latest
    environment:
      - TZ=America/Los_Angeles
    volumes:
      - ./nginx/index.html:/usr/share/nginx/html/index.html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
  youtube-to-mp3:
    networks:
      - my_network
    build:
      context: ./youtube-to-mp3
      args:
        PORT: 8002
    ports:
      - "8002:8002"
    container_name: youtube-to-mp3
    working_dir: /deploy
    restart: unless-stopped
  thundershare:
    networks:
      - my_network
    build:
      context: ./thundershare
      args:
        PORT: 8000
    ports:
      - "8000:8000"
    container_name: thundershare
    working_dir: /deploy
    restart: unless-stopped
networks:
  my_network:
    driver: bridge

configs:
  nginx_conf:
    file: ./nginx/nginx.conf
